name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege default token (OpenSSF Scorecard "Token-Permissions").
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Build BEFORE `npm run check`: the bundle-size gate (check:bundle reads
      # .next/app-build-manifest.json) needs a completed build to compare
      # against bundle-baseline.json. No env vars are set on purpose — the app
      # warns-and-continues on missing config at build time (lib/redis.ts /
      # lib/wagmi.ts), so the build is green without secrets.
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          # Match the Dockerfile: this build OOMs at Node's default heap once
          # sharp's type defs + the bundler load. 4096 is proven-good.
          NODE_OPTIONS: '--max-old-space-size=4096'
      # typecheck + lint + resource-hint CORS + per-route bundle-size.
      - run: npm run check
      # NON-blocking for now: the dependency tree carries known critical/high
      # advisories (transitive, via the Arweave/Turbo + Coinbase CDP subtrees).
      # Drop `continue-on-error` to make new critical/high vulns block merges
      # once the tree is clean.
      - name: npm audit (non-blocking until the tree is clean)
        continue-on-error: true
        run: npm audit --audit-level=high

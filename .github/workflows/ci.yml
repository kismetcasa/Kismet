name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege default token (OpenSSF Scorecard "Token-Permissions").
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Fail if the Next fetch-clone leak patch did NOT apply. The postinstall
      # script (scripts/patch-next-clone-response.mjs) warns-but-exits-0 on
      # file-shape drift so it can't hard-block installs, which means a silent
      # miss would otherwise ship the leak. Assert the marker is in the
      # installed package (both build variants).
      - name: Assert next clone-response patch applied
        run: |
          grep -q 'registry.register(cloned2' node_modules/next/dist/server/lib/clone-response.js
          grep -q 'registry.register(cloned2' node_modules/next/dist/esm/server/lib/clone-response.js
      # Build BEFORE `npm run check`: the bundle-size gate (check:bundle reads
      # .next/app-build-manifest.json) needs a completed build to compare
      # against bundle-baseline.json. No env vars are set on purpose — the app
      # warns-and-continues on missing config at build time (lib/redis.ts /
      # lib/wagmi.ts), so the build is green without secrets.
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          # Match the Dockerfile heap ceiling so CI validates the same build
          # config we deploy. 3072 is the proven value — it builds cleanly and
          # keeps peak RSS (~3.5 GB) under the Coolify host's OOM threshold.
          NODE_OPTIONS: '--max-old-space-size=3072'
      # typecheck + lint + resource-hint CORS + per-route bundle-size.
      - run: npm run check
      # BLOCKING: 0 critical advisories today, so this passes now AND catches
      # any future critical regression at the gate. (high stays report-only
      # below until the transitive tree is triaged — see SCALING.md
      # §B13; dependabot now proposes the parent bumps to get there.)
      - name: npm audit (critical — blocking)
        run: npm audit --audit-level=critical
      # NON-blocking report of highs: the dependency tree carries known high
      # advisories (transitive, via the Arweave/Turbo + Coinbase CDP + wallet
      # subtrees). Drop `continue-on-error` to make new highs block merges once
      # the tree is triaged/VEX-documented.
      - name: npm audit (high — report only)
        continue-on-error: true
        run: npm audit --audit-level=high
